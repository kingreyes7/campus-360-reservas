<svg width="1920" height="1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a0845;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4a148c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0030;stop-opacity:1" />
    </linearGradient>
    <pattern id="dots" x="100" y="100" width="100" height="100" patternUnits="userSpaceOnUse">
      <circle cx="50" cy="50" r="2" fill="#d4af37" opacity="0.15"/>
    </pattern>
  </defs>
  
  <!-- Fondo gradiente -->
  <rect width="1920" height="1080" fill="url(#bgGrad)"/>
  
  <!-- Patrón de puntos -->
  <rect width="1920" height="1080" fill="url(#dots)"/>
  
  <!-- Líneas decorativas diagonales -->
  <line x1="0" y1="0" x2="1920" y2="1080" stroke="#d4af37" stroke-width="0.5" opacity="0.1"/>
  <line x1="1920" y1="0" x2="0" y2="1080" stroke="#d4af37" stroke-width="0.5" opacity="0.1"/>
  
  <!-- Formas geométricas sutiles -->
  <rect x="50" y="100" width="400" height="400" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.1" rx="50"/>
  <rect x="1500" y="600" width="300" height="300" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.1" rx="30"/>
  
  <!-- Círculos decorativos -->
  <circle cx="200" cy="900" r="150" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.08"/>
  <circle cx="1700" cy="200" r="120" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.08"/>
  
  <!-- Efecto de luz -->
  <rect width="1920" height="1080" fill="linear-gradient(180deg, rgba(212,175,55,0.05) 0%, transparent 50%)" />
</svg>
